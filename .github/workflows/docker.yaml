name: Docker

on:
  push:
    tags: ['v*.*.*']

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main

      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build Docker image
        env:
          JWEB_VERSION: ${{ steps.version.outputs.version }}
        run: nix build .#docker --impure --accept-flake-config

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push to GHCR
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          nix develop --accept-flake-config --command skopeo copy \
            docker-archive:result \
            docker://ghcr.io/neelzee/jweb:${VERSION}
          nix develop --accept-flake-config --command skopeo copy \
            docker-archive:result \
            docker://ghcr.io/neelzee/jweb:latest
