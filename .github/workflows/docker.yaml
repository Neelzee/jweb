name: Docker

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main

      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Build Docker image
        run: nix build .#docker --accept-flake-config

      - name: Push to GHCR
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          nix develop --command skopeo copy \
            --dest-creds "${{ github.actor }}:$GITHUB_TOKEN" \
            "docker-archive:$(readlink result)" \
            "docker://ghcr.io/${{ github.repository }}:latest"
